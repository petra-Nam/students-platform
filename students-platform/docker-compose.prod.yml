version: "3.9"
services:
  api:
    build:
      context: ./backend
      target: prod
    ports: ["3000:3000"]
    restart: unless-stopped
    env_file: ./backend/.env
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    build:
      context: ./frontend
      target: prod
    ports: ["8080:80"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
